<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>M169 Mini-Projekt | LAS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 60px 80px;
      text-align: center;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .initials {
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #6366f1, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 1.2rem;
      font-weight: 400;
      color: #94a3b8;
      margin-bottom: 32px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0e7490;
      color: #e0f2fe;
      font-size: 0.85rem;
      padding: 6px 16px;
      border-radius: 999px;
      margin: 6px;
    }

    .info {
      margin-top: 32px;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="initials">LAS</div>
    <h1>Luka Aurelius Sola &mdash; M169 Mini-Projekt</h1>
    <div>
      <span class="badge">🐳 Docker</span>
      <span class="badge">⚡ NGINX</span>
      <span class="badge">☁️ AWS Cloud</span>
    </div>
    <p class="info">GBS St. Gallen &bull; Modul 169 &bull; Container / Cloud</p>
  </div>
</body>
</html>
